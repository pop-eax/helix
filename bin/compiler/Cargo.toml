[package]
name = "helix-compiler"
version.workspace = true
edition.workspace = true

[[bin]]
name = "helixc"
path = "src/main.rs"

[dependencies]
frontend = { path = "../../crates/frontend" }
ir = { path = "../../crates/ir" }
runtime = { path = "../../crates/runtime" }
clap = { version = "4.5", features = ["derive"] }
serde_json = "1.0"

